# =============================================================================
# patch-swift (PatchSDK) — CI: build + test on every push / PR
# =============================================================================
# PatchSDK is a SwiftPM package (swift-tools-version:6.0) built with the Apple
# toolchain on a macOS runner. No WebAssembly SDK is needed: the runtime tests
# instantiate and run committed .wasm fixtures (under Tests/PatchSDKTests/
# Fixtures/) via WasmKit (pure Swift). The one test that needs the large
# regenerable NetworkingGuest.wasm self-skips with XCTSkip when that fixture is
# absent (it is intentionally not committed).
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (swift)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # macos-14 defaults to Xcode 15 / Swift 5.10; the package declares
      # swift-tools-version:6.0, so select an Xcode 16 (Swift 6) toolchain.
      - name: Select Xcode 16 (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift toolchain
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

      # iOS build gate: `swift test` runs on macOS, where the UIKit/StoreKit host
      # bridges are #if canImport(UIKit)-gated out. Build every scheme for the iOS
      # Simulator so iOS-only Swift 6 concurrency / SwiftUI errors fail CI.
      - name: xcodebuild (iOS Simulator)
        run: |
          for scheme in PatchSDK PatchSwiftUI PatchRender PatchViewIR; do
            echo "=== Building $scheme for iOS Simulator ==="
            xcodebuild build \
              -scheme "$scheme" \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO
          done
